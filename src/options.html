<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>X Helper – Settings</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      body {
        max-width: 640px;
        margin: 32px auto;
        padding: 0 20px;
        line-height: 1.5;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 4px;
      }
      p.sub {
        color: #666;
        margin-top: 0;
      }
      label {
        display: block;
        margin-top: 16px;
        font-weight: 600;
        font-size: 13px;
      }
      input,
      select {
        width: 100%;
        padding: 8px 10px;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        margin-top: 4px;
        background: transparent;
        color: inherit;
      }
      .row {
        display: flex;
        gap: 12px;
      }
      .row > div {
        flex: 1;
      }
      button {
        margin-top: 20px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        background: rgb(29, 155, 240);
        color: white;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: rgb(29, 155, 240);
        border: 1px solid rgb(29, 155, 240);
      }
      .status {
        margin-top: 12px;
        font-size: 13px;
        color: #16a34a;
      }
      .status.err {
        color: #dc2626;
      }
      .hint {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
      }
      .presets {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 6px;
      }
      .presets button {
        margin: 0;
        padding: 4px 10px;
        font-size: 12px;
        background: #eee;
        color: #333;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #15202b;
          color: #e7e9ea;
        }
        input,
        select {
          border-color: #334;
        }
        .presets button {
          background: #222e3b;
          color: #e7e9ea;
        }
      }
    </style>
  </head>
  <body>
    <h1>X Helper – Settings</h1>
    <p class="sub">Configure any Anthropic-compatible LLM endpoint.</p>

    <label
      >API Base URL
      <input id="baseUrl" type="text" placeholder="https://api.anthropic.com" />
    </label>
    <div class="presets">
      <button data-preset="https://api.anthropic.com">Anthropic</button>
      <button data-preset="https://api.deepseek.com/anthropic">DeepSeek (Anthropic-compat)</button>
      <button data-preset="https://api.moonshot.cn/anthropic">Kimi / Moonshot</button>
      <button data-preset="http://localhost:11434">Local proxy</button>
    </div>
    <div class="hint">Must implement <code>POST /v1/messages</code> in Anthropic format.</div>

    <label
      >API Key
      <input id="apiKey" type="password" placeholder="sk-ant-..." />
    </label>

    <div class="row">
      <div>
        <label
          >Model
          <input id="model" type="text" placeholder="claude-3-5-sonnet-latest" />
        </label>
      </div>
      <div>
        <label
          >Max Tokens
          <input id="maxTokens" type="number" min="64" max="8192" />
        </label>
      </div>
    </div>

    <button id="save">Save</button>
    <button id="test" class="secondary" type="button">Test connection</button>
    <div id="status" class="status"></div>

    <script src="options.js"></script>
  </body>
</html>
