<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 240px;
        margin: 0;
        padding: 14px 16px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color-scheme: light dark;
      }
      h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      p {
        margin: 0 0 10px;
        color: #666;
        line-height: 1.4;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 600;
        background: rgb(29, 155, 240);
        color: white;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
      }
      kbd {
        background: #eee;
        border-radius: 4px;
        padding: 1px 5px;
        font-size: 11px;
        font-family: ui-monospace, monospace;
      }
      @media (prefers-color-scheme: dark) {
        kbd {
          background: #2a3640;
        }
      }
    </style>
  </head>
  <body>
    <h3>X Helper</h3>
    <p>
      Open X / Twitter and click <b>✨ Polish</b> or <b>💡 Suggest</b> beneath the compose box.
      Shortcuts: <kbd>⌘⇧P</kbd> / <kbd>⌘⇧J</kbd>.
    </p>
    <button id="open">Open Settings</button>
    <script src="popup.js"></script>
  </body>
</html>
